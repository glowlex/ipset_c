name: Tests

on:
  push:
    branches: [ "master", "action_test" ]

env:
  isTox: true

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        os: [ "ubuntu-latest", "macos-latest", "windows-latest" ]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.13t", "3.14", "3.14t"]
    defaults:
      run:
        shell: bash

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Poetry v1
      uses: snok/install-poetry@v1
      if: matrix.python-version < '3.10'
      with:
        version: 1
        virtualenvs-create: true
        virtualenvs-in-project: true
    - name: Install Poetry v2
      uses: snok/install-poetry@v1
      if: matrix.python-version >= '3.10'
      with:
        version: 2
        virtualenvs-create: true
        virtualenvs-in-project: true
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: |
        poetry lock ${{ case(matrix.python-version < '3.10', '--no-update', '') }} 
        poetry ${{ case(matrix.python-version < '3.10', 'install --sync', 'sync') }} --no-interaction --no-root --without dev
    - name: Build
      run: |
        source $VENV
        poetry build -o dist
        pip uninstall --yes ipset_c
        pip install ipset_c --no-index --find-links dist
    - name: Test with pytest
      run: |
        cd tests
        pytest
